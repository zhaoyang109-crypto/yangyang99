<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登了duang啷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');

:root {
  --pink: #FF6EC7;
  --green: #39FF14;
  --purple: #B44FFF;
  --silver: #C0C0C0;
  --dark: #0A0A1A;
  --darker: #060610;
  --card: rgba(255,110,199,0.08);
  --border-pink: rgba(255,110,199,0.4);
  --border-green: rgba(57,255,20,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
  background: var(--darker);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* 背景网格 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,110,199,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,110,199,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* 背景光晕 */
body::after {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(180,79,255,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.glow-orb {
  position: fixed;
  bottom: -150px; right: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(57,255,20,0.1) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.card {
  background: rgba(10,10,26,0.95);
  border: 1px solid var(--border-pink);
  border-radius: 24px;
  padding: 40px 36px;
  max-width: 580px;
  width: 100%;
  position: relative;
  z-index: 1;
  box-shadow:
    0 0 40px rgba(255,110,199,0.1),
    0 0 80px rgba(180,79,255,0.05),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* 顶部装饰条 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--pink), var(--purple), var(--green));
  border-radius: 24px 24px 0 0;
}

/* ── 封面 ── */
#screen-cover { text-align: center; }

.cover-badge {
  display: inline-block;
  background: linear-gradient(135deg, rgba(255,110,199,0.2), rgba(180,79,255,0.2));
  border: 1px solid var(--border-pink);
  color: var(--pink);
  border-radius: 999px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.cover-title {
  font-size: 48px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}

.cover-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 28px;
  line-height: 1.6;
}

.disclaimer {
  background: rgba(57,255,20,0.06);
  border: 1px solid rgba(57,255,20,0.2);
  border-radius: 14px;
  padding: 16px 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  line-height: 1.7;
  text-align: left;
  margin-bottom: 28px;
}

.disclaimer strong {
  color: var(--green);
  font-weight: 700;
}

.level-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 32px;
}

.level-chip {
  background: rgba(255,110,199,0.06);
  border: 1px solid var(--border-pink);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: left;
}

.level-chip .name {
  font-size: 13px;
  font-weight: 700;
  color: var(--pink);
  display: block;
  margin-bottom: 2px;
}

.level-chip .pct {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
}

.level-chip.special {
  border-color: var(--border-green);
  grid-column: span 2;
}

.level-chip.special .name { color: var(--green); }

/* ── 按钮 ── */
.btn-start {
  display: inline-block;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 14px;
  padding: 18px 56px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1px;
  box-shadow: 0 0 30px rgba(255,110,199,0.3), 0 0 60px rgba(255,110,199,0.1);
  transition: all .2s;
  position: relative;
  overflow: hidden;
  width: 100%;
}

.btn-start::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left .4s;
}

.btn-start:hover::before { left: 100%; }
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(255,110,199,0.5), 0 0 80px rgba(255,110,199,0.2);
}
.btn-start:active { transform: translateY(0); }

/* ── 答题 ── */
#screen-quiz { display: none; }

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.q-counter {
  font-size: 22px;
  color: rgba(255,255,255,0.85);
  font-weight: 800;
  letter-spacing: 2px;
}

.q-dim {
  font-size: 11px;
  color: var(--pink);
  font-weight: 700;
  letter-spacing: 1px;
  background: rgba(255,110,199,0.1);
  border: 1px solid rgba(255,110,199,0.2);
  padding: 3px 10px;
  border-radius: 999px;
}

/* 登味儿浓度计（答题中隐藏）*/

.q-text {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  line-height: 1.5;
  margin-bottom: 24px;
  min-height: 60px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.opt {
  background: rgba(255,110,199,0.04);
  border: 1px solid rgba(255,110,199,0.2);
  border-radius: 14px;
  padding: 16px 18px;
  cursor: pointer;
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.5;
  transition: all .18s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  position: relative;
  overflow: hidden;
}

.opt::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,110,199,0.08), rgba(180,79,255,0.08));
  opacity: 0;
  transition: opacity .18s;
}

.opt:hover {
  border-color: var(--pink);
  color: #fff;
  transform: translateX(4px);
  box-shadow: 0 0 20px rgba(255,110,199,0.1);
}

.opt:hover::before { opacity: 1; }

.opt.selected {
  border-color: var(--pink);
  color: #fff;
  box-shadow: 0 0 20px rgba(255,110,199,0.15), inset 0 0 20px rgba(255,110,199,0.05);
}

.opt.selected::before { opacity: 1; }

.opt-label {
  font-size: 13px;
  font-weight: 800;
  color: var(--pink);
  flex-shrink: 0;
  width: 22px;
  margin-top: 1px;
}

/* ── 加载动画 ── */
#screen-loading {
  display: none;
  text-align: center;
  padding: 20px 0;
}

.loading-title {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 32px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.97); }
}

.loading-steps {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
  text-align: left;
}

.loading-step {
  font-size: 14px;
  color: rgba(255,255,255,0.25);
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: color .3s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.loading-step.active {
  color: var(--green);
}

.loading-step.done {
  color: rgba(255,255,255,0.4);
}

.step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
  transition: background .3s;
}

.loading-step.active .step-dot {
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink .6s infinite;
}

.loading-step.done .step-dot {
  background: rgba(255,255,255,0.3);
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.duang-text {
  font-size: 64px;
  font-weight: 900;
  opacity: 0;
  transform: scale(0.5);
  transition: all .4s cubic-bezier(.34,1.56,.64,1);
  background: linear-gradient(135deg, var(--pink), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.duang-text.show {
  opacity: 1;
  transform: scale(1);
}

/* ── 结果 ── */
#screen-result { display: none; }

.result-header { text-align: center; margin-bottom: 28px; }

.result-index-label {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  font-weight: 700;
  margin-bottom: 8px;
}

.result-pct {
  font-size: 56px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
}

.result-title {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 4px;
}

.result-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
}

/* 结果进度条 */
.result-meter {
  margin-bottom: 28px;
}

.result-meter-track {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,110,199,0.2);
  border-radius: 999px;
  height: 16px;
  overflow: hidden;
}

.result-meter-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--green), var(--pink), var(--purple));
  width: 0%;
  transition: width 1.4s cubic-bezier(.22,1,.36,1);
  position: relative;
}

.result-meter-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 12px; height: 100%;
  background: rgba(255,255,255,0.7);
  border-radius: 999px;
  filter: blur(3px);
}

.result-desc {
  background: rgba(255,110,199,0.05);
  border: 1px solid var(--border-pink);
  border-radius: 16px;
  padding: 20px 22px;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  line-height: 1.8;
  margin-bottom: 24px;
}

/* 等级分布图 */
.level-map-section {
  margin-bottom: 32px;
}

.level-map {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 16px;
}

.level-map-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px 14px;
  transition: all .3s;
}

.level-map-active {
  background: rgba(255,110,199,0.12);
  border-color: rgba(255,110,199,0.6);
  box-shadow: 0 0 20px rgba(255,110,199,0.15);
}

.level-map-bar-wrap {
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  height: 6px;
  margin-bottom: 8px;
  overflow: hidden;
}

.level-map-bar {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--green), var(--pink), var(--purple));
}

.level-map-active .level-map-bar {
  background: linear-gradient(90deg, var(--pink), var(--purple));
  box-shadow: 0 0 8px rgba(255,110,199,0.5);
}

.level-map-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.level-map-title {
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
}

.level-map-active .level-map-title {
  color: var(--pink);
}

.level-map-pct {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
}

.level-map-active .level-map-pct {
  color: var(--pink);
}

.level-map-you {
  margin-top: 6px;
  font-size: 12px;
  color: var(--pink);
  font-weight: 800;
  letter-spacing: 1px;
}

/* 维度分析 */
.dim-section {
  margin-bottom: 24px;
}

.dim-title {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--green);
  margin-bottom: 12px;
  text-transform: uppercase;
}

.dim-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.dim-item {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dim-name {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  width: 80px;
  flex-shrink: 0;
  font-weight: 600;
}

.dim-bar-track {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 999px;
  height: 8px;
  overflow: hidden;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 999px;
  width: 0%;
  transition: width 1s cubic-bezier(.22,1,.36,1);
}

.dim-score {
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.dim-analysis {
  background: rgba(255,255,255,0.03);
  border-left: 2px solid;
  border-radius: 0 10px 10px 0;
  padding: 12px 16px;
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  line-height: 1.7;
  margin-top: 6px;
}

/* 底部按钮 */
.btn-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 28px;
}

.btn-share {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 12px;
  padding: 16px;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 1px;
  box-shadow: 0 0 30px rgba(255,110,199,0.2);
  transition: all .2s;
}

.btn-share:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(255,110,199,0.4);
}

.btn-retry {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  border-radius: 12px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  transition: all .2s;
}

.btn-retry:hover {
  border-color: var(--green);
  color: var(--green);
}

.fade-in {
  animation: fadeIn .35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 星星装饰 */
.star {
  position: fixed;
  width: 3px; height: 3px;
  background: #fff;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.6; transform: scale(1); }
}
</style>
</head>
<body>

<div class="glow-orb"></div>

<!-- 星星 -->
<script>
for(let i=0;i<30;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*100}vh;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
  document.body.appendChild(s);
}
</script>

<div class="card" id="main-card">

  <!-- ── 封面 ── -->
  <div id="screen-cover">
    <div class="cover-badge">✦ 登味儿自测 2026 ✦</div>
    <div class="cover-title">登了duang啷</div>
    <div class="cover-sub">15道题，测出你骨子里的登味儿浓度<br>以及你到底在哪里最登</div>

    <div class="disclaimer">
      <strong>免责声明：</strong>本测试结果仅供娱乐参考，不构成任何心理诊断、人格鉴定或道德审判。测试结果偏高不代表你是坏人，偏低不代表你已经得道。如测试结果引发不适，请先喝杯水，再想想为什么别人都没不适就你不适。
    </div>

    <button class="btn-start" onclick="startQuiz()">开始检测登味儿浓度 ✦</button>
    <div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.2);text-align:center;">共15题 · 约8-10分钟</div>
  </div>

  <!-- ── 答题 ── -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <div class="q-counter" id="q-counter">01 / 15</div>
    </div>

    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>

  <!-- ── 加载 ── -->
  <div id="screen-loading">
    <div class="loading-title">检测中...</div>
    <div class="loading-steps" id="loading-steps"></div>
    <div class="duang-text" id="duang-text">duang啷！</div>
  </div>

  <!-- ── 结果 ── -->
  <div id="screen-result">
    <div class="result-header">
      <div class="result-index-label">你的登味儿指数</div>
      <div class="result-pct" id="result-pct"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-subtitle" id="result-subtitle"></div>
    </div>

    <div class="result-meter">
      <div class="result-meter-track">
        <div class="result-meter-fill" id="result-meter-fill"></div>
      </div>
    </div>

    <div class="result-desc" id="result-desc"></div>

    <div class="level-map-section">
      <div class="dim-title">✦ 你在登界的位置</div>
      <div class="level-map" id="level-map"></div>
    </div>

    <div class="dim-section">
      <div class="dim-title">✦ 你的登味儿成分分析</div>
      <div class="dim-list" id="dim-list"></div>
    </div>

    <div class="btn-row">
      <button class="btn-share" onclick="shareResult()">分享给朋友 ✦</button>
      <button class="btn-retry" onclick="restartQuiz()">再测一次</button>
    </div>
  </div>

</div>

<script>
// ── 数据 ──────────────────────────────────────────────
const DIMS = ["认知惰性","权力惯性","自我认知盲区","边界感模糊","共情力迟钝"];
const DIM_COLORS = ["#FF6EC7","#B44FFF","#39FF14","#FF9F0A","#00D4FF"];

const QUESTIONS = [
  // 维度一：认知惰性
  {dim:0, text:"朋友跟你说最近有一件事让他很困扰，你的第一反应是？", opts:[
    "先问问Ta现在最需要什么，倾诉还是建议",
    "一边听一边帮Ta梳理，这样沟通效率更高",
    "根据我的经验这种情况一般是XX，先帮Ta分析一下",
    "朋友有困难当然要帮，马上给Ta几条可执行的建议，别在情绪里耗着"
  ]},
  {dim:0, text:"你所在的领域出现了一个新趋势/新工具，你的态度是？", opts:[
    "先去了解一下，说不定有意思",
    "看看别人用得怎么样再说",
    "评估了一下，和现有的方法本质差不多，暂时不需要换",
    "这种东西见多了，风口过了还是得回到基本功，别被带跑"
  ]},
  {dim:0, text:"有人做事的方式和你不一样，但结果也还不错，你会？", opts:[
    "挺好奇的，想了解他怎么想的",
    "结果不错就好，方式是他的事",
    "结果可以，但方式上还是有值得改进的地方",
    "这次结果好不代表方式是对的，成功有时候靠的是运气"
  ]},
  // 维度二：权力惯性
  {dim:1, text:"新来的同事在做一件你很熟悉的事，你会？", opts:[

// ── 状态 ──────────────────────────────────────────────
let current = 0;
let answers = [];
let dimScores = [0,0,0,0,0];
let totalScore = 0;
let answering = false;
let runningScore = 0;

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ── 开始 ──────────────────────────────────────────────
function startQuiz() {
  current=0; answers=[]; dimScores=[0,0,0,0,0]; totalScore=0; runningScore=0;
  show('screen-quiz');
  renderQuestion();
}

function show(id) {
  ['screen-cover','screen-quiz','screen-loading','screen-result'].forEach(s=>{
    document.getElementById(s).style.display = s===id ? 'block' : 'none';
  });
}

// ── 渲染题目 ──────────────────────────────────────────
function renderQuestion() {
  answering = false;
  const q = QUESTIONS[current];
  const n = current+1;

  document.getElementById('q-counter').textContent = `${String(n).padStart(2,'0')} / 15`;
  document.getElementById('q-text').textContent = q.text;

  // 打乱选项
  const labels = ['A','B','C','D'];
  const indexed = q.opts.map((text,i)=>({text, score:SCORES[i]}));
  const shuffled = shuffle(indexed);

  const container = document.getElementById('options');
  container.innerHTML = '';
  shuffled.forEach((opt,i)=>{
    const el = document.createElement('div');
    el.className = 'opt fade-in';
    el.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt.text}</span>`;
    el.onclick = ()=>selectOpt(el, opt.score, q.dim);
    container.appendChild(el);
  });
}

// ── 选择选项 ──────────────────────────────────────────
function selectOpt(el, score, dim) {
  if(answering) return;
  answering = true;

  document.querySelectorAll('.opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');

  runningScore += score;
  dimScores[dim] += score;
  answers.push(score);

  setTimeout(()=>{
    current++;
    if(current < QUESTIONS.length) {
      renderQuestion();
    } else {
      totalScore = answers.reduce((a,b)=>a+b,0);
      showLoading();
    }
  }, 380);
}

// ── 加载动画 ──────────────────────────────────────────
const LOADING_STEPS = [
  "正在提取登味儿样本…",
  "检测认知惰性浓度…",
  "校准权力惯性读数…",
  "扫描自我认知盲区…",
  "分析边界感数据…",
  "比对共情力迟钝指数…",
  "登味儿数据库匹配中…"
];

function showLoading() {
  show('screen-loading');
  const container = document.getElementById('loading-steps');
  container.innerHTML = LOADING_STEPS.map((s,i)=>
    `<div class="loading-step" id="step-${i}">
      <div class="step-dot"></div>${s}
    </div>`
  ).join('');

  let i=0;
  const interval = setInterval(()=>{
    if(i>0) {
      document.getElementById(`step-${i-1}`).classList.remove('active');
      document.getElementById(`step-${i-1}`).classList.add('done');
    }
    if(i<LOADING_STEPS.length) {
      document.getElementById(`step-${i}`).classList.add('active');
      i++;
    } else {
      clearInterval(interval);
      setTimeout(()=>{
        const d = document.getElementById('duang-text');
        d.classList.add('show');
        setTimeout(showResult, 800);
      }, 300);
    }
  }, 350);
}

// ── 结果 ──────────────────────────────────────────────
function showResult() {
  show('screen-result');

  const level = LEVELS.find(l=>totalScore>=l.min&&totalScore<=l.max)||LEVELS[LEVELS.length-1];

  document.getElementById('result-pct').textContent = level.pct;
  document.getElementById('result-title').textContent = level.title;
  document.getElementById('result-subtitle').textContent = level.sub;
  document.getElementById('result-desc').textContent = level.desc;

  setTimeout(()=>{
    document.getElementById('result-meter-fill').style.width = level.meterPct+'%';
  }, 100);

  // 维度分析
  const container = document.getElementById('dim-list');
  container.innerHTML = '';
  DIMS.forEach((name,i)=>{
    const score = dimScores[i];
    const pct = Math.round((score/21)*100);
    const tier = score<=9 ? 0 : score<=14 ? 1 : 2;
    const color = DIM_COLORS[i];

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="dim-item">
        <div class="dim-name">${name}</div>
        <div class="dim-bar-track">
          <div class="dim-bar-fill" id="dim-bar-${i}" style="background:${color}"></div>
        </div>
        <div class="dim-score">${score}/21</div>
      </div>
      <div class="dim-analysis" style="border-color:${color}">${DIM_ANALYSIS[i][tier]}</div>
    `;
    container.appendChild(el);

    setTimeout(()=>{
      document.getElementById(`dim-bar-${i}`).style.width = pct+'%';
    }, 200 + i*100);
  });

  // 等级分布图
  const mapContainer = document.getElementById('level-map');
  mapContainer.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const isUser = (lv === level);
    const el = document.createElement('div');
    el.className = 'level-map-item' + (isUser ? ' level-map-active' : '');
    el.innerHTML = `
      <div class="level-map-bar-wrap">
        <div class="level-map-bar" style="width:${lv.meterPct}%"></div>
      </div>
      <div class="level-map-info">
        <span class="level-map-title">${lv.title}</span>
        <span class="level-map-pct">${lv.pct}</span>
      </div>
      ${isUser ? '<div class="level-map-you">← 你在这里</div>' : ''}
    `;
    mapContainer.appendChild(el);
  });

  document.getElementById('screen-result').classList.add('fade-in');
}

// ── 分享 ──────────────────────────────────────────────
function shareResult() {
  const title = document.getElementById('result-title').textContent;
  const pct = document.getElementById('result-pct').textContent;
  const text = `我测出来是「${title}」！登味指数${pct}\n快来测测你是哪种登 👉 登了duang啷`;
  if(navigator.share) {
    navigator.share({title:'登了duang啷', text, url:window.location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      alert('已复制到剪贴板，快去分享给朋友！✦');
    }).catch(()=>{
      alert('截图分享更方便哦 📸');
    });
  }
}

function restartQuiz() {
  show('screen-cover');
}
