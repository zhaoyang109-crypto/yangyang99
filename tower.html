<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>🪐 星球守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;display:flex;flex-direction:column;align-items:center;font-family:"Microsoft YaHei",Arial,sans-serif;user-select:none;min-height:100vh;padding:8px;overflow:hidden}
#topbar{width:860px;display:flex;justify-content:space-between;align-items:center;padding:7px 14px;background:rgba(10,15,40,0.9);border:1px solid #1e3a6e;border-radius:10px;margin-bottom:6px;color:#c9d1d9}
.stat{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:bold}
#crystal-v{color:#7ee8fa}#hp-v{color:#ff6b9d}#wave-v{color:#a78bfa}#score-v{color:#fbbf24}
#canvas{display:block;cursor:crosshair;border-radius:6px;border:1px solid #1e3a6e}
#bottombar{width:860px;background:rgba(10,15,40,0.92);border:1px solid #1e3a6e;border-radius:10px;margin-top:6px;padding:10px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(20,30,70,0.8);border:2px solid #1e3a6e;border-radius:9px;padding:7px 10px;cursor:pointer;transition:all .15s;min-width:82px;color:#c9d1d9;font-size:11px}
.tbtn:hover{border-color:#7ee8fa;background:rgba(30,60,120,0.8)}
.tbtn.sel{border-color:#fbbf24;background:rgba(60,50,0,0.7);box-shadow:0 0 10px #fbbf2444}
.tbtn .ico{font-size:20px}
.tbtn .nm{font-weight:bold;font-size:12px;color:#e6edf3}
.tbtn .cs{color:#7ee8fa;font-size:11px}
.tbtn .ds{color:#6e7681;font-size:10px}
#hint{color:#6e7681;font-size:12px;margin-left:auto;text-align:right;line-height:1.6;max-width:170px}
#wavebtn{background:linear-gradient(135deg,#1d4ed8,#7c3aed);border:none;color:#fff;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;white-space:nowrap;transition:all .2s;box-shadow:0 0 12px #7c3aed55}
#wavebtn:hover{box-shadow:0 0 20px #7c3aed88;transform:scale(1.04)}
#wavebtn:disabled{background:#1c2128;cursor:default;color:#484f58;box-shadow:none;transform:none}
</style>
</head>
<body>
<div id="topbar">
  <div class="stat">💎 星晶 <span id="crystal-v">200</span></div>
  <div class="stat">🪐 星球 <span id="hp-v">20</span></div>
  <div class="stat">🌊 波次 <span id="wave-v">0/12</span></div>
  <div class="stat">⭐ 得分 <span id="score-v">0</span></div>
  <div style="color:#484f58;font-size:12px">右键防御塔升级 | 点击查看射程</div>
</div>
<canvas id="canvas" width="860" height="500"></canvas>
<div id="bottombar">
  <div class="tbtn sel" id="btn-laser" onclick="selectType('laser')">
    <span class="ico">🔫</span><span class="nm">激光炮台</span>
    <span class="cs">💎 60</span><span class="ds">快速精准</span>
  </div>
  <div class="tbtn" id="btn-missile" onclick="selectType('missile')">
    <span class="ico">🚀</span><span class="nm">导弹发射井</span>
    <span class="cs">💎 100</span><span class="ds">范围爆炸</span>
  </div>
  <div class="tbtn" id="btn-ion" onclick="selectType('ion')">
    <span class="ico">⚡</span><span class="nm">离子炮</span>
    <span class="cs">💎 120</span><span class="ds">链式放电</span>
  </div>
  <div class="tbtn" id="btn-freeze" onclick="selectType('freeze')">
    <span class="ico">🌀</span><span class="nm">引力场</span>
    <span class="cs">💎 80</span><span class="ds">减速舰队</span>
  </div>
  <div class="tbtn" id="btn-plasma" onclick="selectType('plasma')">
    <span class="ico">🌟</span><span class="nm">等离子炮</span>
    <span class="cs">💎 90</span><span class="ds">持续灼烧</span>
  </div>
  <div class="tbtn" id="btn-blackhole" onclick="selectType('blackhole')">
    <span class="ico">🕳️</span><span class="nm">黑洞炮</span>
    <span class="cs">💎 160</span><span class="ds">超远狙击</span>
  </div>
  <div id="hint">选择防御塔<br>点击星域格子放置</div>
  <button id="wavebtn" onclick="startWave()">▶ 迎战第 1 波入侵</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  画布 & 常量
// ═══════════════════════════════════════════════════════════
const C = document.getElementById('canvas');
const ctx = C.getContext('2d');
const W = 860, H = 500;
const CELL = 28;
const COLS = Math.floor(W / CELL); // 30
const ROWS = Math.floor(H / CELL); // 17

// ── 入侵航线（列,行）──────────────────────────────────────
const RAW_PATH = [
  [0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
  [6,2],[6,3],[6,4],[6,5],[6,6],[6,7],[6,8],
  [7,8],[8,8],[9,8],[10,8],[11,8],[12,8],
  [12,7],[12,6],[12,5],[12,4],[12,3],[12,2],[12,1],
  [13,1],[14,1],[15,1],[16,1],[17,1],[18,1],[19,1],[20,1],
  [20,2],[20,3],[20,4],[20,5],[20,6],[20,7],[20,8],[20,9],[20,10],[20,11],
  [19,11],[18,11],[17,11],[16,11],[15,11],[14,11],[13,11],[12,11],[11,11],
  [11,12],[11,13],[11,14],[11,15],
  [12,15],[13,15],[14,15],[15,15],[16,15],[17,15],[18,15],[19,15],[20,15],[21,15],[22,15],
  [22,14],[22,13],[22,12],[22,11],[22,10],[22,9],
  [23,9],[24,9],[25,9],[26,9],[27,9],[28,9],[29,9]
];

const PATH_PX = RAW_PATH.map(([c,r]) => ({ x: c*CELL+CELL/2, y: r*CELL+CELL/2 }));
const PATH_SET = new Set(RAW_PATH.map(([c,r]) => `${c},${r}`));

// ── 防御塔定义 ────────────────────────────────────────────
const TD = {
  laser:     { cost:60,  range:115, dmg:20,  rate:32,  color:'#00d2ff', glow:'#00d2ff', icon:'🔫', name:'激光炮台',   splash:0,  slow:0,   chain:0, burn:0 },
  missile:   { cost:100, range:88,  dmg:75,  rate:85,  color:'#ff6b35', glow:'#ff6b35', icon:'🚀', name:'导弹发射井', splash:58, slow:0,   chain:0, burn:0 },
  ion:       { cost:120, range:108, dmg:32,  rate:48,  color:'#a78bfa', glow:'#a78bfa', icon:'⚡', name:'离子炮',     splash:0,  slow:0,   chain:4, burn:0 },
  freeze:    { cost:80,  range:98,  dmg:12,  rate:58,  color:'#38bdf8', glow:'#38bdf8', icon:'🌀', name:'引力场',     splash:68, slow:0.38,chain:0, burn:0 },
  plasma:    { cost:90,  range:92,  dmg:9,   rate:52,  color:'#f472b6', glow:'#f472b6', icon:'🌟', name:'等离子炮',   splash:0,  slow:0,   chain:0, burn:200 },
  blackhole: { cost:160, range:210, dmg:180, rate:130, color:'#818cf8', glow:'#818cf8', icon:'🕳️', name:'黑洞炮',     splash:0,  slow:0,   chain:0, burn:0 },
};

const UPGRADES = [
  { dmgMul:1.55, rateMul:0.78, rangeMul:1.12, costMul:0.65 },
  { dmgMul:2.2,  rateMul:0.62, rangeMul:1.25, costMul:1.1  },
];

// ── 敌人定义 ──────────────────────────────────────────────
const ED = {
  scout:    { hp:90,   spd:1.6,  reward:12, color:'#34d399', r:8,  name:'侦察机' },
  fighter:  { hp:240,  spd:1.05, reward:22, color:'#fb923c', r:11, name:'战斗机' },
  cruiser:  { hp:550,  spd:0.68, reward:42, color:'#60a5fa', r:14, name:'巡洋舰' },
  phantom:  { hp:160,  spd:2.1,  reward:30, color:'#e879f9', r:9,  name:'幻影机' },
  carrier:  { hp:1000, spd:0.85, reward:95, color:'#f87171', r:17, name:'航母'   },
  mothership:{ hp:2800,spd:0.52, reward:260,color:'#fbbf24', r:22, name:'母舰'   },
};

// ── 波次配置 ──────────────────────────────────────────────
const WAVES = [
  [{t:'scout',n:8,iv:52}],
  [{t:'scout',n:12,iv:42},{t:'fighter',n:3,iv:88}],
  [{t:'fighter',n:9,iv:62},{t:'scout',n:10,iv:38}],
  [{t:'cruiser',n:4,iv:105},{t:'scout',n:16,iv:36}],
  [{t:'phantom',n:12,iv:40},{t:'fighter',n:8,iv:58}],
  [{t:'cruiser',n:7,iv:78},{t:'phantom',n:14,iv:36}],
  [{t:'carrier',n:2,iv:140},{t:'fighter',n:12,iv:48}],
  [{t:'mothership',n:1,iv:999},{t:'cruiser',n:6,iv:82}],
  [{t:'carrier',n:4,iv:98},{t:'phantom',n:18,iv:30}],
  [{t:'mothership',n:2,iv:210},{t:'carrier',n:3,iv:115}],
  [{t:'mothership',n:3,iv:165},{t:'cruiser',n:10,iv:68},{t:'phantom',n:20,iv:28}],
  [{t:'mothership',n:5,iv:125},{t:'carrier',n:5,iv:88},{t:'fighter',n:20,iv:38}],
];

// ═══════════════════════════════════════════════════════════
//  星空背景（静态生成）
// ═══════════════════════════════════════════════════════════
const STARS = [];
for (let i = 0; i < 220; i++) {
  STARS.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.2,
    bright: Math.random(),
    twinkleSpeed: Math.random() * 0.04 + 0.01,
    twinkleOffset: Math.random() * Math.PI * 2,
  });
}

// 星云色块（背景装饰）
const NEBULAS = [
  { x:120, y:80,  rx:160, ry:90,  color:'rgba(100,60,200,0.06)' },
  { x:600, y:350, rx:200, ry:110, color:'rgba(0,150,255,0.05)'  },
  { x:350, y:200, rx:130, ry:80,  color:'rgba(200,50,150,0.04)' },
];

// ═══════════════════════════════════════════════════════════
//  游戏状态
// ═══════════════════════════════════════════════════════════
let crystal, hp, score, waveNum, waveActive, gameState;
let towers, enemies, bullets, particles, floats;
let spawnQueue, spawnTimer;
let selType = 'laser';
let hoverC = -1, hoverR = -1;
let inspectTower = null;
let frame = 0;

function initGame() {
  crystal = 200; hp = 20; score = 0; waveNum = 0; waveActive = false;
  gameState = 'idle';
  towers = []; enemies = []; bullets = []; particles = []; floats = [];
  spawnQueue = []; spawnTimer = 0;
  selType = 'laser';
  inspectTower = null;
  updateUI();
  const btn = document.getElementById('wavebtn');
  btn.disabled = false;
  btn.textContent = '▶ 迎战第 1 波入侵';
}

function updateUI() {
  document.getElementById('crystal-v').textContent = crystal;
  document.getElementById('hp-v').textContent = hp;
  document.getElementById('wave-v').textContent = `${waveNum}/${WAVES.length}`;
  document.getElementById('score-v').textContent = score;
}

// ═══════════════════════════════════════════════════════════
//  防御塔
// ═══════════════════════════════════════════════════════════
function placeTower(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  if (PATH_SET.has(`${col},${row}`)) return;
  if (towers.find(t => t.col===col && t.row===row)) return;
  const def = TD[selType];
  if (crystal < def.cost) { showHint('星晶不足！'); return; }
  crystal -= def.cost;
  score += 5;
  towers.push({
    col, row,
    x: col*CELL+CELL/2, y: row*CELL+CELL/2,
    type: selType,
    level: 0,
    range: def.range,
    dmg: def.dmg,
    rate: def.rate,
    cd: 0,
    angle: -Math.PI/2,
    pulsePhase: Math.random()*Math.PI*2,
  });
  updateUI();
  addFloat(col*CELL+CELL/2, row*CELL+CELL/2-12, `-${def.cost}💎`, '#7ee8fa');
}

function upgradeTower(t) {
  if (t.level >= 2) { showHint('已达最高级！'); return; }
  const def = TD[t.type];
  const upg = UPGRADES[t.level];
  const cost = Math.round(def.cost * upg.costMul);
  if (crystal < cost) { showHint(`升级需要 ${cost} 💎`); return; }
  crystal -= cost;
  t.level++;
  const u = UPGRADES[t.level - 1];
  t.dmg   = Math.round(def.dmg   * u.dmgMul);
  t.rate  = Math.round(def.rate  * u.rateMul);
  t.range = Math.round(def.range * u.rangeMul);
  score += 20;
  updateUI();
  addFloat(t.x, t.y - 16, '⬆ 系统升级', '#fbbf24');
  spawnBurst(t.x, t.y, TD[t.type].color, 12);
}

function updateTowers() {
  for (const t of towers) {
    if (t.cd > 0) { t.cd--; continue; }
    let best = null, bestIdx = -1;
    for (const e of enemies) {
      if (e.dead || e.done) continue;
      const dx = e.x - t.x, dy = e.y - t.y;
      if (dx*dx + dy*dy <= t.range*t.range && e.pidx > bestIdx) {
        bestIdx = e.pidx; best = e;
      }
    }
    if (!best) continue;
    t.angle = Math.atan2(best.y - t.y, best.x - t.x);
    fireTower(t, best);
    t.cd = t.rate;
  }
}

function fireTower(t, target) {
  const def = TD[t.type];
  if (def.chain > 0) {
    const chain = [target];
    let cur = target;
    for (let i = 0; i < def.chain - 1; i++) {
      let next = null, nd = 95;
      for (const e of enemies) {
        if (e.dead || e.done || chain.includes(e)) continue;
        const d = Math.hypot(e.x-cur.x, e.y-cur.y);
        if (d < nd) { nd = d; next = e; }
      }
      if (!next) break;
      chain.push(next); cur = next;
    }
    bullets.push({ type:'chain', x:t.x, y:t.y, chain, dmg:t.dmg, life:10, color:def.color, glow:def.glow });
  } else {
    bullets.push({
      type: t.type, x:t.x, y:t.y,
      target, dmg:t.dmg,
      splash: def.splash, slow: def.slow, burn: def.burn,
      spd: t.type==='blackhole' ? 11 : t.type==='missile' ? 4.5 : 7,
      color: def.color, glow: def.glow,
      r: t.type==='missile' ? 6 : t.type==='blackhole' ? 7 : 4,
      dead: false,
    });
  }
}

function updateBullets() {
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (b.type === 'chain') {
      b.life--;
      if (b.life <= 0) {
        for (let j = 0; j < b.chain.length; j++) {
          const e = b.chain[j];
          if (!e.dead && !e.done) hurtEnemy(e, b.dmg * Math.pow(0.62, j));
        }
        bullets.splice(i, 1);
      }
      continue;
    }
    if (b.dead) { bullets.splice(i, 1); continue; }
    if (b.target.dead || b.target.done) { b.dead = true; continue; }
    const dx = b.target.x - b.x, dy = b.target.y - b.y;
    const d = Math.hypot(dx, dy);
    if (d < b.spd + 2) {
      if (b.splash > 0) {
        for (const e of enemies) {
          if (e.dead || e.done) continue;
          if (Math.hypot(e.x-b.target.x, e.y-b.target.y) <= b.splash) {
            hurtEnemy(e, b.dmg);
            if (b.slow > 0) { e.slowTimer = 110; e.slowFactor = b.slow; }
          }
        }
        spawnBurst(b.target.x, b.target.y, b.color, 14);
      } else {
        hurtEnemy(b.target, b.dmg);
        if (b.slow > 0) { b.target.slowTimer = 110; b.target.slowFactor = b.slow; }
        if (b.burn > 0) { b.target.burnTimer = b.burn; b.target.burnDmg = b.dmg * 0.45; }
      }
      b.dead = true;
    } else {
      b.x += dx/d * b.spd;
      b.y += dy/d * b.spd;
    }
  }
}

function hurtEnemy(e, dmg) {
  e.hp -= dmg;
  if (e.hp <= 0) killEnemy(e);
}

// ═══════════════════════════════════════════════════════════
//  敌人
// ═══════════════════════════════════════════════════════════
function spawnEnemy(type) {
  const def = ED[type];
  const start = PATH_PX[0];
  enemies.push({
    type, hp: def.hp, maxHp: def.hp,
    spd: def.spd, reward: def.reward,
    color: def.color, r: def.r,
    x: start.x - 90, y: start.y,
    pidx: 0, dead: false, done: false,
    slowTimer: 0, slowFactor: 1,
    burnTimer: 0, burnDmg: 0,
    angle: 0,
  });
}

function killEnemy(e) {
  if (e.dead) return;
  e.dead = true;
  crystal += e.reward;
  score += e.reward * 3;
  updateUI();
  spawnBurst(e.x, e.y, e.color, 10);
  addFloat(e.x, e.y - e.r - 4, `+${e.reward}💎`, '#7ee8fa');
}

function updateEnemies() {
  for (const e of enemies) {
    if (e.dead || e.done) continue;
    if (e.burnTimer > 0) {
      e.burnTimer--;
      if (e.burnTimer % 16 === 0) {
        e.hp -= e.burnDmg;
        if (e.hp <= 0) { killEnemy(e); continue; }
        spawnBurst(e.x, e.y, '#f472b6', 3);
      }
    }
    const spd = e.spd * (e.slowTimer > 0 ? e.slowFactor : 1);
    if (e.slowTimer > 0) e.slowTimer--;
    if (e.pidx >= PATH_PX.length) {
      e.done = true;
      hp = Math.max(0, hp - 1);
      updateUI();
      if (hp <= 0) triggerGameOver();
      continue;
    }
    const tgt = PATH_PX[e.pidx];
    const dx = tgt.x - e.x, dy = tgt.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d < spd + 0.5) {
      e.x = tgt.x; e.y = tgt.y; e.pidx++;
    } else {
      e.angle = Math.atan2(dy, dx);
      e.x += dx/d * spd; e.y += dy/d * spd;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  波次
// ═══════════════════════════════════════════════════════════
function startWave() {
  if (waveActive || waveNum >= WAVES.length) return;
  waveNum++;
  waveActive = true;
  gameState = 'playing';
  updateUI();
  const btn = document.getElementById('wavebtn');
  btn.disabled = true;
  btn.textContent = `第 ${waveNum} 波入侵中...`;
  spawnQueue = [];
  spawnTimer = 0;
  for (const g of WAVES[waveNum - 1]) {
    for (let i = 0; i < g.n; i++) {
      spawnQueue.push({ type: g.t, at: i * g.iv });
    }
  }
  spawnQueue.sort((a,b) => a.at - b.at);
}

function updateWave() {
  if (!waveActive) return;
  spawnTimer++;
  while (spawnQueue.length > 0 && spawnQueue[0].at <= spawnTimer) {
    spawnEnemy(spawnQueue.shift().type);
  }
  if (spawnQueue.length === 0 && enemies.every(e => e.dead || e.done)) {
    waveActive = false;
    if (waveNum >= WAVES.length) {
      triggerWin();
    } else {
      const bonus = 35 + waveNum * 12;
      crystal += bonus;
      score += 120;
      updateUI();
      addFloat(W/2, H/2 - 20, `🛡 防线稳固！+${bonus}💎`, '#7ee8fa');
      const btn = document.getElementById('wavebtn');
      btn.disabled = false;
      btn.textContent = `▶ 迎战第 ${waveNum+1} 波入侵`;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  粒子 & 浮字
// ═══════════════════════════════════════════════════════════
function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*3.5+0.8;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-0.5, color, life:40, r:Math.random()*2.5+0.8 });
  }
}

function addFloat(x, y, text, color) {
  floats.push({ x, y, text, color, life:60 });
}

function showHint(msg) {
  const el = document.getElementById('hint');
  el.textContent = msg;
  el.style.color = '#f87171';
  setTimeout(() => {
    el.innerHTML = '选择防御塔<br>点击星域格子放置';
    el.style.color = '#6e7681';
  }, 2000);
}

function triggerGameOver() {
  gameState = 'over';
  document.getElementById('wavebtn').disabled = true;
}

function triggerWin() {
  gameState = 'win';
  score += 800;
  updateUI();
}

// ═══════════════════════════════════════════════════════════
//  绘制：背景
// ═══════════════════════════════════════════════════════════
function drawBackground() {
  // 深空渐变
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, '#050d1f');
  grad.addColorStop(1, '#020510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星云
  for (const nb of NEBULAS) {
    ctx.save();
    ctx.translate(nb.x, nb.y);
    ctx.scale(1, nb.ry/nb.rx);
    const g = ctx.createRadialGradient(0,0,0,0,0,nb.rx);
    g.addColorStop(0, nb.color);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,0,nb.rx,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // 星星（闪烁）
  for (const s of STARS) {
    const bright = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(frame * s.twinkleSpeed + s.twinkleOffset));
    ctx.globalAlpha = bright * s.bright * 0.9 + 0.1;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  绘制：航线
// ═══════════════════════════════════════════════════════════
function drawPath() {
  // 航线底色
  for (const [c,r] of RAW_PATH) {
    ctx.fillStyle = 'rgba(30,60,120,0.35)';
    ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
  }
  // 航线中心线（虚线）
  ctx.strokeStyle = 'rgba(100,160,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  ctx.moveTo(PATH_PX[0].x, PATH_PX[0].y);
  for (let i = 1; i < PATH_PX.length; i++) ctx.lineTo(PATH_PX[i].x, PATH_PX[i].y);
  ctx.stroke();
  ctx.setLineDash([]);

  // 起点（入侵方向箭头）
  const s = PATH_PX[0];
  ctx.fillStyle = '#f87171';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('▶ 入侵', s.x, s.y + 4);

  // 终点（星球）
  const e = PATH_PX[PATH_PX.length - 1];
  const pulse = 0.7 + 0.3 * Math.sin(frame * 0.06);
  // 星球光晕
  const glow = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 22 * pulse);
  glow.addColorStop(0, 'rgba(100,200,255,0.5)');
  glow.addColorStop(0.5, 'rgba(60,120,255,0.2)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(e.x, e.y, 22 * pulse, 0, Math.PI*2); ctx.fill();
  // 星球本体
  const pg = ctx.createRadialGradient(e.x-4, e.y-4, 2, e.x, e.y, 12);
  pg.addColorStop(0, '#7ee8fa');
  pg.addColorStop(0.5, '#2563eb');
  pg.addColorStop(1, '#1e1b4b');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(e.x, e.y, 12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '9px Arial';
  ctx.fillText('🪐', e.x, e.y + 4);
  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════════
//  绘制：格子 & 悬停
// ═══════════════════════════════════════════════════════════
function drawGrid() {
  // 可放置格子（非路径）淡淡网格线
  ctx.strokeStyle = 'rgba(30,58,110,0.3)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!PATH_SET.has(`${c},${r}`)) {
        ctx.strokeRect(c*CELL+0.5, r*CELL+0.5, CELL-1, CELL-1);
      }
    }
  }
  // 悬停高亮
  if (hoverC >= 0 && hoverR >= 0 && !PATH_SET.has(`${hoverC},${hoverR}`) && !towers.find(t=>t.col===hoverC&&t.row===hoverR)) {
    const def = TD[selType];
    ctx.fillStyle = 'rgba(126,232,250,0.12)';
    ctx.fillRect(hoverC*CELL, hoverR*CELL, CELL, CELL);
    ctx.strokeStyle = 'rgba(126,232,250,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(hoverC*CELL+0.5, hoverR*CELL+0.5, CELL-1, CELL-1);
    // 射程预览
    ctx.strokeStyle = def.glow + '44';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.arc(hoverC*CELL+CELL/2, hoverR*CELL+CELL/2, def.range, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ═══════════════════════════════════════════════════════════
//  绘制：防御塔
// ═══════════════════════════════════════════════════════════
function drawTowers() {
  for (const t of towers) {
    const def = TD[t.type];
    const x = t.x, y = t.y;
    const rr = CELL/2 - 2;
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.05 + t.pulsePhase);

    // 底座光晕
    ctx.shadowColor = def.glow;
    ctx.shadowBlur = 8 + pulse * 6;
    ctx.fillStyle = 'rgba(10,15,40,0.9)';
    ctx.beginPath(); ctx.arc(x, y, rr+2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // 等级光环
    if (t.level >= 1) {
      ctx.strokeStyle = t.level === 2 ? '#fbbf24' : '#7ee8fa';
      ctx.lineWidth = t.level === 2 ? 2.5 : 1.5;
      ctx.shadowColor = t.level === 2 ? '#fbbf24' : '#7ee8fa';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(x, y, rr+4, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // 主体
    const g = ctx.createRadialGradient(x-2, y-2, 1, x, y, rr);
    g.addColorStop(0, def.color + 'ff');
    g.addColorStop(1, def.color + '55');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, rr, 0, Math.PI*2); ctx.fill();

    // 炮管
    ctx.save();
    ctx.translate(x, y); ctx.rotate(t.angle);
    ctx.shadowColor = def.glow; ctx.shadowBlur = 6;
    ctx.fillStyle = '#e2e8f0';
    ctx.fillRect(-2, -(rr+6), 4, rr+6);
    ctx.shadowBlur = 0;
    ctx.restore();

    // 图标
    ctx.font = `${CELL*0.48}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, x, y);
    ctx.textBaseline = 'alphabetic';

    // 等级星
    if (t.level > 0) {
      ctx.fillStyle = '#fbbf24';
      ctx.font = 'bold 8px Arial';
      ctx.fillText('★'.repeat(t.level), x - t.level*4, y + rr + 8);
    }

    // 选中射程圈
    if (inspectTower === t) {
      ctx.strokeStyle = def.glow + '66';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.arc(x, y, t.range, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════════
//  绘制：敌人（飞船造型）
// ═══════════════════════════════════════════════════════════
function drawEnemies() {
  for (const e of enemies) {
    if (e.dead || e.done) continue;
    const x = e.x, y = e.y, r = e.r;

    // 减速光圈
    if (e.slowTimer > 0) {
      ctx.strokeStyle = '#38bdf855'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, r+5, 0, Math.PI*2); ctx.stroke();
    }
    // 灼烧光圈
    if (e.burnTimer > 0) {
      ctx.strokeStyle = '#f472b655'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, r+7, 0, Math.PI*2); ctx.stroke();
    }

    // 飞船本体（旋转朝向）
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(e.angle);

    // 引擎尾焰
    const flameLen = r * 1.2;
    const flameGrad = ctx.createLinearGradient(0, 0, -flameLen, 0);
    flameGrad.addColorStop(0, e.color + 'cc');
    flameGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(-r*0.4, -r*0.3);
    ctx.lineTo(-r - flameLen, 0);
    ctx.lineTo(-r*0.4, r*0.3);
    ctx.closePath(); ctx.fill();

    // 飞船主体
    ctx.shadowColor = e.color; ctx.shadowBlur = 8;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(-r*0.5, -r*0.55);
    ctx.lineTo(-r*0.2, 0);
    ctx.lineTo(-r*0.5, r*0.55);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;

    // 驾驶舱
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(r*0.1, 0, r*0.28, 0, Math.PI*2); ctx.fill();

    ctx.restore();

    // 血条
    const bw = r*2+6;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(x-bw/2, y-r-10, bw, 5);
    const pct = e.hp/e.maxHp;
    ctx.fillStyle = pct>0.5 ? '#22c55e' : pct>0.25 ? '#f59e0b' : '#ef4444';
    ctx.fillRect(x-bw/2, y-r-10, bw*pct, 5);

    // 母舰标签
    if (e.type === 'mothership') {
      ctx.fillStyle = '#fbbf24';
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('母舰', x, y + r + 11);
      ctx.textAlign = 'left';
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  绘制：子弹
// ═══════════════════════════════════════════════════════════
function drawBullets() {
  for (const b of bullets) {
    if (b.type === 'chain') {
      if (b.chain.length < 2) continue;
      // 闪电效果
      ctx.shadowColor = b.glow; ctx.shadowBlur = 12;
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      // 从炮台到第一个目标
      ctx.moveTo(b.x, b.y);
      for (const e of b.chain) {
        // 锯齿闪电
        const mx = (b.x + e.x)/2 + (Math.random()-0.5)*20;
        const my = (b.y + e.y)/2 + (Math.random()-0.5)*20;
        ctx.quadraticCurveTo(mx, my, e.x, e.y);
        b.x = e.x; b.y = e.y; // 链式
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
      continue;
    }
    if (b.dead) continue;
    ctx.shadowColor = b.glow; ctx.shadowBlur = 10;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // 拖尾
    if (!b.target.dead && !b.target.done) {
      const dx = b.target.x-b.x, dy = b.target.y-b.y;
      const d = Math.hypot(dx,dy)||1;
      ctx.strokeStyle = b.color + '44'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - dx/d*16, b.y - dy/d*16);
      ctx.stroke();
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  绘制：粒子 & 浮字
// ═══════════════════════════════════════════════════════════
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life/40;
    ctx.shadowColor = p.color; ctx.shadowBlur = 4;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  for (const f of floats) {
    ctx.globalAlpha = Math.min(1, f.life/20);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = f.color; ctx.shadowBlur = 6;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floats.length-1; i >= 0; i--) {
    floats[i].y -= 0.9; floats[i].life--;
    if (floats[i].life <= 0) floats.splice(i, 1);
  }
}

// ═══════════════════════════════════════════════════════════
//  绘制：炮塔信息面板
// ═══════════════════════════════════════════════════════════
function drawInspectPanel() {
  if (!inspectTower) return;
  const t = inspectTower;
  const def = TD[t.type];
  let px = t.x + 18, py = t.y - 70;
  const pw = 158, ph = 88;
  px = Math.min(px, W - pw - 4);
  py = Math.max(4, Math.min(py, H - ph - 4));

  ctx.fillStyle = 'rgba(5,13,31,0.95)';
  ctx.strokeStyle = def.glow;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = def.glow; ctx.shadowBlur = 8;
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeRect(px, py, pw, ph);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#e6edf3';
  ctx.font = `bold 12px Arial`;
  ctx.fillText(`${def.icon} ${def.name}`, px+8, py+18);
  ctx.fillStyle = '#7ee8fa';
  ctx.font = '10px Arial';
  ctx.fillText(`等级 ${'★'.repeat(t.level+1)}`, px+8, py+32);
  ctx.fillStyle = '#8b949e';
  ctx.fillText(`伤害:${t.dmg}  射程:${t.range}`, px+8, py+46);
  ctx.fillText(`攻速:${(60/t.rate).toFixed(1)}/s`, px+8, py+60);
  if (t.level < 2) {
    const cost = Math.round(def.cost * UPGRADES[t.level].costMul);
    ctx.fillStyle = crystal >= cost ? '#22c55e' : '#ef4444';
    ctx.fillText(`右键升级 💎${cost}`, px+8, py+76);
  } else {
    ctx.fillStyle = '#fbbf24';
    ctx.fillText('★★ 已达最高级', px+8, py+76);
  }
}

// ═══════════════════════════════════════════════════════════
//  绘制：覆盖层
// ═══════════════════════════════════════════════════════════
function drawOverlay() {
  if (gameState === 'idle') {
    ctx.fillStyle = 'rgba(2,5,16,0.88)';
    ctx.fillRect(0, 0, W, H);
    // 标题光晕
    ctx.shadowColor = '#7ee8fa'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#7ee8fa';
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🪐 星球守护者', W/2, H/2 - 80);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '16px Arial';
    ctx.fillText('外星舰队正在入侵！建造防御塔，保卫你的星球', W/2, H/2 - 38);
    ctx.fillStyle = '#6e7681';
    ctx.font = '13px Arial';
    ctx.fillText('🔫激光  🚀导弹  ⚡离子  🌀引力场  🌟等离子  🕳️黑洞', W/2, H/2 + 2);
    ctx.fillText('右键炮台升级 | 点击炮台查看射程 | 消灭敌舰获得星晶💎', W/2, H/2 + 26);
    ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 17px Arial';
    ctx.fillText('▶ 点击下方按钮开始迎战', W/2, H/2 + 68);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
  } else if (gameState === 'over') {
    ctx.fillStyle = 'rgba(2,5,16,0.9)';
    ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 25;
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 44px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('💥 星球沦陷！', W/2, H/2 - 55);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '20px Arial';
    ctx.fillText(`最终得分：${score}   坚守了 ${waveNum} 波`, W/2, H/2 + 5);
    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 16px Arial';
    ctx.fillText('点击任意位置重新守护', W/2, H/2 + 48);
    ctx.textAlign = 'left';
  } else if (gameState === 'win') {
    ctx.fillStyle = 'rgba(2,5,16,0.9)';
    ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🌟 星球守护成功！', W/2, H/2 - 55);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '20px Arial';
    ctx.fillText(`最终得分：${score}`, W/2, H/2 + 5);
    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 16px Arial';
    ctx.fillText('点击任意位置再次守护', W/2, H/2 + 48);
    ctx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════
//  主循环
// ═══════════════════════════════════════════════════════════
function loop() {
  frame++;
  drawBackground();
  drawPath();
  drawGrid();

  if (gameState === 'playing') {
    updateWave();
    updateEnemies();
    updateTowers();
    updateBullets();
    updateParticles();
  }

  drawEnemies();
  drawBullets();
  drawTowers();
  drawParticles();
  drawInspectPanel();
  drawOverlay();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
//  输入
// ═══════════════════════════════════════════════════════════
function selectType(type) {
  selType = type;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('sel'));
  document.getElementById('btn-'+type).classList.add('sel');
  inspectTower = null;
}

C.addEventListener('mousemove', e => {
  const rect = C.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  hoverC = Math.floor(mx / CELL);
  hoverR = Math.floor(my / CELL);
  C.style.cursor = towers.find(t=>t.col===hoverC&&t.row===hoverR) ? 'pointer' : 'crosshair';
});

C.addEventListener('mouseleave', () => { hoverC = -1; hoverR = -1; });

C.addEventListener('click', e => {
  if (gameState === 'over' || gameState === 'win') { initGame(); return; }
  const rect = C.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  const found = towers.find(t => t.col===col && t.row===row);
  if (found) { inspectTower = inspectTower === found ? null : found; return; }
  inspectTower = null;
  if (gameState === 'idle' || gameState === 'playing') placeTower(col, row);
});

C.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  const found = towers.find(t => t.col===col && t.row===row);
  if (found) upgradeTower(found);
});

// ═══════════════════════════════════════════════════════════
//  启动
// ═══════════════════════════════════════════════════════════
initGame();
loop();
</script>
